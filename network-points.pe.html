<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>网络覆盖计划- PE</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:#eef3f7;
      --paper:#ffffff;
      --ink:#10253d;
      --muted:#65788c;
      --line:#d7e1ea;
      --shadow:0 16px 34px rgba(16,37,61,.10);
    }
    * { box-sizing:border-box; }
    html, body { height:100%; }
    body { margin:0; font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:linear-gradient(180deg,#f7fafc 0,#edf2f6 100%); color:var(--ink); }
    .shell { height:100vh; display:grid; grid-template-rows:auto 1fr; }
    .topbar { padding:10px 12px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.94); backdrop-filter:blur(10px); }
    .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .page-title { margin:0 4px 0 0; font-size:26px; letter-spacing:.1px; flex:0 0 auto; }
    .legend { display:flex; gap:10px; align-items:center; font-size:12px; color:var(--muted); flex:0 0 auto; padding:6px 10px; border:1px solid #d7e2ec; border-radius:14px; background:#fff; }
    .legend-item { display:inline-flex; align-items:center; gap:8px; }
    .sw-dot { width:12px; height:12px; border-radius:50%; display:inline-block; }
    .filter-group { display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid var(--line); border-radius:14px; background:#fff; }
    .filter-group strong { font-size:12px; }
    .filter-group label { font-size:12px; color:#31465b; }
    .filter-group button { border:1px solid #cfd9e3; background:#fff; color:var(--ink); border-radius:10px; padding:5px 10px; font-size:12px; cursor:pointer; }
    .stats { margin-left:auto; display:flex; gap:8px; }
    .stat { min-width:92px; padding:6px 10px; border-radius:12px; border:1px solid var(--line); background:#fff; }
    .stat .k { font-size:11px; color:var(--muted); }
    .stat .v { font-size:17px; font-weight:800; }
    .main { min-height:0; display:grid; grid-template-columns:minmax(0,1fr) 360px; gap:10px; padding:10px; }
    .main.sidebar-collapsed { grid-template-columns:minmax(0,1fr); }
    .map-card, .panel { background:var(--paper); border:1px solid var(--line); border-radius:22px; overflow:hidden; box-shadow:var(--shadow); }
    #map { min-height:860px; height:100%; }
    .panel.hidden { display:none; }
    .panel-head { padding:12px 14px 10px; border-bottom:1px solid #e5edf3; }
    .panel-head h2 { margin:0; font-size:16px; }
    .panel-head p { margin:6px 0 0; font-size:12px; color:var(--muted); line-height:1.5; }
    .panel-body { padding:12px; overflow:auto; max-height:calc(100vh - 180px); background:#f8fbfd; }
    .node-card { padding:12px; border:1px solid #dce5ee; border-radius:16px; background:#fff; margin-bottom:10px; }
    .node-name { font-size:14px; font-weight:800; }
    .meta { margin-top:6px; font-size:12px; color:var(--muted); line-height:1.5; }
    .leaflet-div-icon { background:transparent; border:none; }
    .radar { width:18px; height:18px; border:2px solid currentColor; background:currentColor; border-radius:50%; box-shadow:0 0 0 4px rgba(255,255,255,.9); }
    .mini-dot { width:8px; height:8px; border-radius:50%; background:#8b97a5; opacity:.55; }
    .leaflet-tooltip.city-label { background:rgba(255,255,255,.96); color:var(--ink); border:1px solid #d7e1ea; border-radius:10px; box-shadow:0 8px 18px rgba(15,39,64,.10); font-size:11px; font-weight:700; padding:2px 6px; }
    .leaflet-tooltip.city-label::before { display:none; }
    .popup-title { font-weight:800; margin-bottom:6px; }
    .popup-row { font-size:12px; line-height:1.55; }
    .popup-member-box { margin-top:6px; max-height:180px; overflow:auto; padding-right:6px; border-top:1px solid #e5edf3; padding-top:6px; }
    .popup-member-box div { font-size:12px; line-height:1.5; }
    @media (max-width: 1380px) {
      .main, .main.sidebar-collapsed { grid-template-columns:1fr; }
      #map { min-height:640px; }
      .stats { margin-left:0; }
    }
  </style>
</head>

7.9806, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010602", "member_district": "Chirimoto", "member_province": "Rodriguez de Mendoza", "member_department": "Amazonas", "member_pop": 2079, "distance_km": 70.1, "lat": -6.5283, "lon": -77.4869, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010603", "member_district": "Cochamal", "member_province": "Rodriguez de Mendoza", "member_department": "Amazonas", "member_pop": 504, "distance_km": 51.8, "lat": -6.3933, "lon": -77.5889, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010604", "member_district": "Huambo", "member_province": "Rodriguez de Mendoza", "member_department": "Amazonas", "member_pop": 2542, "distance_km": 58.6, "lat": -6.4275, "lon": -77.5369, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010605", "member_district": "Limabamba", "member_province": "Rodriguez de Mendoza", "member_department": "Amazonas", "member_pop": 3049, "distance_km": 66.3, "lat": -6.5025, "lon": -77.5097, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010606", "member_district": "Longar", "member_province": "Rodriguez de Mendoza", "member_department": "Amazonas", "member_pop": 1619, "distance_km": 55.0, "lat": -6.3853, "lon": -77.5461, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010607", "member_district": "Mariscal Benavides", "member_province": "Rodriguez de Mendoza", "member_department": "Amazonas", "member_pop": 1376, "distance_km": 58.3, "lat": -6.3697, "lon": -77.5003, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010705", "member_district": "Jamalca", "member_province": "Utcubamba", "member_department": "Amazonas", "member_pop": 8243, "distance_km": 36.0, "lat": -5.9158, "lon": -78.2203, "stage": "第4阶段"}, {"node_id": "N67", "node_label": "Luya", "member_ubigeo": "010706", "member_district": "Lonya Grande", "member_province": "Utcubamba", "member_department": "Amazonas", "member_pop": 10443, "distance_km": 51.9, "lat": -6.0956, "lon": -78.4219, "stage": "第4阶段"}]};
    const map = L.map('map', {zoomControl:true, dragging:true, scrollWheelZoom:true}).setView([-10.3, -75.7], 6);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:18, attribution:'&copy; OpenStreetMap'}).addTo(map);
    const colors = payload.stage_colors;
    const nodesLayer = L.layerGroup().addTo(map);
    const membersLayer = L.layerGroup().addTo(map);
    const labelsLayer = L.layerGroup().addTo(map);
    const nodeLayers = {};
    const labelLayers = {};
    const memberLayers = {};
    let activeNode = null;

    function radarIcon(color) {
      return L.divIcon({html:`<div class="radar" style="color:${color}"></div>`, iconSize:[24,24], iconAnchor:[12,12]});
    }
    function memberIcon() {
      return L.divIcon({html:`<div class="mini-dot"></div>`, iconSize:[10,10], iconAnchor:[5,5]});
    }

    payload.nodes.forEach(node => {
      const color = colors[node.stage] || '#8b97a5';
      const marker = L.marker([node.lat, node.lon], {icon: radarIcon(color), zIndexOffset:900});
      const memberList = node.members
        .sort((a, b) => b.population - a.population)
        .map(m => `<div>${m.district} (${m.ubigeo}) / ${m.distance_km}km</div>`)
        .join('');
      marker.bindPopup(`<div class="popup-title">${node.label}</div>
        <div class="popup-row">网点编码：${node.id}</div>
        <div class="popup-row">所属省/大区：${node.province} / ${node.department}</div>
        <div class="popup-row">启动阶段：${node.stage}</div>
        <div class="popup-row">服务频次：${node.frequency}</div>
        <div class="popup-row">20公里聚集人口：${node.cluster20.toLocaleString('en-US')}</div>
        <div class="popup-row">覆盖行政区：${node.coverage_count}</div>
        <div class="popup-row">覆盖人口：${node.coverage_population.toLocaleString('en-US')}</div>
        <div class="popup-row">覆盖行政区明细：</div>
        <div class="popup-member-box">${memberList}</div>`);
      nodeLayers[node.id] = {layer: marker, info: node};
      labelLayers[node.id] = L.tooltip({permanent:true, direction:'top', offset:[0,-14], className:'city-label'})
        .setLatLng([node.lat, node.lon]).setContent(node.label);
      memberLayers[node.id] = node.members.map(m => L.marker([m.lat, m.lon], {icon: memberIcon(), zIndexOffset:200}));
    });

    function activeFilters() {
      return {
        stages: new Set(Array.from(document.querySelectorAll('input[data-stage]:checked')).map(el => el.value)),
        labels: document.getElementById('toggleLabels').checked,
        members: document.getElementById('toggleMembers').checked,
      };
    }

    function nodeCard(node) {
      return `<div class="node-card">
        <div class="node-name">${node.id} / ${node.label}</div>
        <div class="meta">${node.stage} / ${node.frequency}</div>
        <div class="meta">覆盖行政区：${node.coverage_count} / 覆盖人口：${node.coverage_population.toLocaleString('en-US')}</div>
        <div class="meta">20公里聚集人口：${node.cluster20.toLocaleString('en-US')}</div>
      </div>`;
    }

    function refresh(fit=false) {
      const f = activeFilters();
      nodesLayer.clearLayers();
      membersLayer.clearLayers();
      labelsLayer.clearLayers();
      let bounds = null;
      const visibleNodes = [];
      payload.nodes.forEach(node => {
        if (!f.stages.has(node.stage)) return;
        nodeLayers[node.id].layer.addTo(nodesLayer);
        visibleNodes.push(node);
        if (f.labels) labelLayers[node.id].addTo(labelsLayer);
        if (f.members) {
          memberLayers[node.id].forEach(m => {
            m.setOpacity(!activeNode || activeNode === node.id ? 0.55 : 0.12);
            m.addTo(membersLayer);
          });
        }
        const p = L.latLng(node.lat, node.lon);
        bounds = bounds ? bounds.extend(p) : L.latLngBounds([p], [p]);
      });
      document.getElementById('visibleNodeCount').textContent = visibleNodes.length;
      document.getElementById('nodeList').innerHTML = visibleNodes.map(nodeCard).join('');
      if (fit && bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.14));
    }

    document.querySelectorAll('input[data-stage],#toggleLabels,#toggleMembers').forEach(el => el.addEventListener('change', () => refresh(false)));
    document.getElementById('resetViewBtn').addEventListener('click', () => refresh(true));
    payload.nodes.forEach(node => {
      nodeLayers[node.id].layer.on('click', e => {
        if (e.originalEvent) L.DomEvent.stopPropagation(e.originalEvent);
        activeNode = activeNode === node.id ? null : node.id;
        refresh(false);
        nodeLayers[node.id].layer.openPopup();
      });
    });
    map.on('click', () => {
      if (activeNode) {
        activeNode = null;
        refresh(false);
      }
    });
    refresh(true);
  </script>

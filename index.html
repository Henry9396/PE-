    <p>本图只保留两类线路：干线与支线。干线用红色实线表示，支线用蓝色虚线表示。IQUITOS 线路按空运干线处理，归入干线体系。主城市圈按正式开通分期着色，成员行政区用更小号雷达点提示覆盖范围，不抢主视觉。</p>

 MARIA城市圈", "TRUJILLO城市圈", "TUMBES城市圈", "USQUIL城市圈"]};
    const colors = payload.phase_colors;

    const map = L.map('map', {zoomControl:true}).setView([-10.3, -75.7], 6);

    const linesLayer = L.layerGroup().addTo(map);

    function radarIcon(color) {
      return L.divIcon({className:'radar-wrap', html:`<div class="radar" style="color:${color}"></div>`, iconSize:[24,24], iconAnchor:[12,12]});
    }
    function miniRadarIcon(color) {
      return L.divIcon({className:'mini-radar-wrap', html:`<div class="mini-radar" style="color:${color}"></div>`, iconSize:[15,15], iconAnchor:[7.5,7.5]});
    }

    const lineLayers = {};
    const cityLayers = {};
    const memberLayers = {};
    const labelLayers = {};

    payload.lines.forEach(line => {
      const latlngs = line.path.map(p => [p.lat, p.lon]);
      const style = line.line_type === '干线' ? trunkStyle : branchStyle;
      const poly = L.polyline(latlngs, style);
      poly.bindPopup(`<div class="popup-title">${line.line_code} / ${line.line_name}</div>
        <div class="popup-row">类型：${line.line_type} / 生效分期：${line.phase}</div>

      lineLayers[line.line_code] = { layer: poly, info: line, bounds: poly.getBounds() };
    });

      labelLayers[city.circle] = label;
    });

    payload.members.forEach(item => {

      const marker = L.marker([item.lat, item.lon], {icon: miniRadarIcon(color), zIndexOffset: 250});

      if (!memberLayers[item.circle]) memberLayers[item.circle] = [];
      memberLayers[item.circle].push(marker);
    });

    function activeFilters() {
      return {
        phases: new Set(Array.from(document.querySelectorAll('input[data-phase]:checked')).map(el => el.value)),
        types: new Set(Array.from(document.querySelectorAll('input[data-type]:checked')).map(el => el.value)),
        labels: document.getElementById('toggleLabels').checked,
        members: document.getElementById('toggleMembers').checked,
      };
    }

    function lineCard(line) {
      const badgeClass = line.line_type === '干线' ? 'trunk' : 'branch';
      return `<div class="line-item">
<h3><span class="badge ${badgeClass}">${line.line_code}</span>${line.line_name}</h3>
<div class="meta">${line.phase} / ${line.line_type} / ${line.run_days}</div>
<div class="meta">${line.depart_node} → ${line.final_node}</div>
<div class="meta">发车 ${line.depart_time} / 终到 ${line.final_arrive}</div>
<div class="meta">${line.route_text}</div>
</div>`;
    }

    function refresh(shouldFit = false) {
      const f = activeFilters();
      linesLayer.clearLayers();
      citiesLayer.clearLayers();
      membersLayer.clearLayers();
      labelsLayer.clearLayers();

      let bounds = null;
      const visibleLines = [];
      const circlesFromVisibleLines = new Set();

      Object.values(lineLayers).forEach(obj => {
        const show = f.phases.has(obj.info.phase) && f.types.has(obj.info.line_type);
        if (!show) return;
        obj.layer.addTo(linesLayer);
        visibleLines.push(obj.info);
        obj.info.path.forEach(p => circlesFromVisibleLines.add(p.circle));
        bounds = bounds ? bounds.extend(obj.bounds) : L.latLngBounds(obj.bounds);
      });

      let visibleCities = 0;
      payload.cities.forEach(city => {
        const forceShow = circlesFromVisibleLines.has(city.circle);
        const showCity = f.phases.has(city.phase) || forceShow;
        if (!showCity) return;
        cityLayers[city.circle].addTo(citiesLayer);
        visibleCities += 1;
        if (f.labels) labelLayers[city.circle].addTo(labelsLayer);
        if (f.members && memberLayers[city.circle]) {
          memberLayers[city.circle].forEach(m => m.addTo(membersLayer));
        }
      });

      document.getElementById('visibleLineCount').textContent = visibleLines.length;
      document.getElementById('visibleCityCount').textContent = visibleCities;
      document.getElementById('lineList').innerHTML = visibleLines.map(lineCard).join('') || '<div class="card"><div class="k">当前没有符合筛选条件的线路</div></div>';
      if (shouldFit && bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.16));
    }

    document.querySelectorAll('input[data-phase], input[data-type], #toggleLabels, #toggleMembers').forEach(el => el.addEventListener('change', () => refresh(false)));
    document.getElementById('resetViewBtn').addEventListener('click', () => refresh(true));
    refresh(true);
  </script>

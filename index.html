<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>秘鲁起网地图·干支线行政区版</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:#edf2f7;
      --paper:#ffffff;
      --panel:#f8fbfd;
      --line:#d6e0ea;
      --ink:#0f2740;
      --muted:#5d7085;
      --trunk:#d62f2f;
      --branch:#2558bd;
      --p1:#d62f2f;
      --p2:#f08a24;
      --p3:#79b83b;
      --shadow:0 14px 34px rgba(15,39,64,.10);
    }
    * { box-sizing:border-box; }
    html, body { height:100%; }
    body { margin:0; font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:radial-gradient(circle at top left,#f6fafc 0,#edf2f7 45%,#e8eef4 100%); color:var(--ink); }
    .shell { height:100vh; display:grid; grid-template-rows:auto 1fr; }
    .topbar { padding:22px 28px 12px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.88); backdrop-filter: blur(12px); }
    .page-title { margin:0 0 14px; font-size:32px; letter-spacing:.2px; }
    .top-grid { display:grid; grid-template-columns:minmax(440px,1.1fr) minmax(420px,.95fr) 320px; gap:16px; align-items:stretch; }
    .top-card { background:var(--paper); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); }
    .top-card-inner { padding:16px 18px; }
    .title-block p { margin:0; font-size:14px; line-height:1.6; color:var(--muted); }
    .legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:12px; font-size:13px; color:var(--muted); }
    .legend-item { display:inline-flex; align-items:center; gap:8px; }
    .sw-line { width:24px; height:4px; border-radius:999px; }
    .sw-dot { width:12px; height:12px; border-radius:50%; display:inline-block; }
    .filters-wrap { display:flex; flex-direction:column; gap:10px; justify-content:center; }
    .filters-wrap .filter-group { width:100%; }
    .top-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .main { min-height:0; display:grid; grid-template-columns:minmax(760px,1fr) 430px; gap:18px; padding:18px; }
    .map-card { min-height:0; position:relative; background:var(--paper); border:1px solid var(--line); border-radius:24px; overflow:hidden; box-shadow:var(--shadow); }
    #map { height:100%; min-height:720px; }
    .filter-group { display:flex; align-items:center; flex-wrap:wrap; gap:8px; padding:10px 12px; background:rgba(255,255,255,.93); border:1px solid #d7e2ec; border-radius:16px; box-shadow:0 8px 20px rgba(15,39,64,.08); }
    .filter-group strong { font-size:12px; color:var(--ink); margin-right:2px; }
    .filter-group label { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#2f465b; cursor:pointer; user-select:none; }
    .filter-group button { border:1px solid #cfd9e3; background:#fff; color:var(--ink); border-radius:10px; padding:6px 10px; font-size:12px; cursor:pointer; }
    .filter-group button.subtle { color:var(--muted); border-color:#d9e2ea; background:#f8fbfd; }
    .sidebar { min-height:0; display:grid; grid-template-rows:1fr; gap:14px; }
    .stat-card, .section-card { background:var(--paper); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); }
    .stat-card { padding:16px 18px; }
    .stat-card .k { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .stat-card .v { font-size:32px; font-weight:800; color:var(--ink); }
    .section-card { min-height:0; display:flex; flex-direction:column; overflow:hidden; }
    .section-head { padding:16px 18px 10px; border-bottom:1px solid #e3ebf2; }
    .section-head h2 { margin:0; font-size:16px; }
    .section-head p { margin:6px 0 0; font-size:12px; color:var(--muted); line-height:1.5; }
    .section-body { min-height:0; overflow:auto; padding:14px; background:var(--panel); }
    .line-list { display:flex; flex-direction:column; gap:12px; }
    .line-card { background:#fff; border:1px solid #dde7ef; border-radius:18px; padding:14px 14px 12px; box-shadow:0 8px 18px rgba(15,39,64,.05); }
    .line-card-head { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .badge { display:inline-flex; align-items:center; justify-content:center; min-width:46px; height:26px; padding:0 10px; border-radius:999px; color:#fff; font-size:11px; font-weight:800; }
    .badge.trunk { background:var(--trunk); }
    .badge.branch { background:var(--branch); }
    .line-name { font-weight:800; font-size:15px; }
    .meta, .route { font-size:12px; line-height:1.55; color:var(--muted); }
    .route { margin-top:6px; color:#16314d; font-weight:700; }
    .leaflet-div-icon { background:transparent; border:none; }
    .radar, .mini-radar { position:relative; border-radius:50%; color:inherit; }
    .radar { width:20px; height:20px; border:2px solid currentColor; background:currentColor; box-shadow:0 0 0 4px rgba(255,255,255,.88); }
    .radar::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:20px; height:20px; border-radius:50%; border:2px solid currentColor; opacity:.40; animation:pulse 1.8s infinite ease-out; }
    .mini-radar { width:11px; height:11px; border:1.5px solid currentColor; background:rgba(255,255,255,.98); box-shadow:0 0 0 1px rgba(255,255,255,.85); }
    .mini-radar::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:11px; height:11px; border-radius:50%; border:1.5px solid currentColor; opacity:.26; animation:miniPulse 2.2s infinite ease-out; }
    @keyframes pulse { 0% { transform:translate(-50%,-50%) scale(1); opacity:.56; } 100% { transform:translate(-50%,-50%) scale(2.9); opacity:0; } }
    @keyframes miniPulse { 0% { transform:translate(-50%,-50%) scale(1); opacity:.30; } 100% { transform:translate(-50%,-50%) scale(2.15); opacity:0; } }
    .leaflet-tooltip.city-label { background:rgba(255,255,255,.94); color:var(--ink); border:1px solid #d7e1ea; border-radius:10px; box-shadow:0 8px 18px rgba(15,39,64,.10); font-size:11px; font-weight:700; padding:2px 6px; }
    .leaflet-tooltip.city-label::before { display:none; }
    .popup-title { font-weight:800; margin-bottom:6px; }
    .popup-row { font-size:12px; line-height:1.55; }
    @media (max-width: 1380px) { .top-grid { grid-template-columns:1fr; } .main { grid-template-columns:1fr; } #map { min-height:640px; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <h1 class="page-title">秘鲁起网地图 · 干支线行政区版</h1>
      <div class="top-grid">
        <section class="top-card">
          <div class="top-card-inner title-block">
            <p>本图按 40 个商圈完整展示。只保留两类线路：干线与支线。IQUITOS 线路按空运干线处理。线路列表仅展示分期、线路类型、运行日、起终点和串点路径，不再展示发车/终到时间。</p>
            <div class="legend">
              <span class="legend-item"><i class="sw-line" style="background:var(--trunk)"></i>干线</span>
              <span class="legend-item"><i class="sw-line" style="background:repeating-linear-gradient(90deg,var(--branch) 0 10px,transparent 10px 16px);height:3px"></i>支线</span>
              <span class="legend-item"><i class="sw-dot" style="background:var(--p1)"></i>第1期城市圈</span>
              <span class="legend-item"><i class="sw-dot" style="background:var(--p2)"></i>第2期城市圈</span>
              <span class="legend-item"><i class="sw-dot" style="background:var(--p3)"></i>第3期城市圈</span>
              <span class="legend-item"><i class="sw-dot" style="background:#8b97a5"></i>成员行政区小雷达点</span>
            </div>
          </div>
        </section>
        <section class="top-card">
          <div class="top-card-inner filters-wrap">
            <div class="filter-group">
              <strong>排期</strong>
              <label><input type="checkbox" data-phase value="第1期" checked>第1期</label>
              <label><input type="checkbox" data-phase value="第2期" checked>第2期</label>
              <label><input type="checkbox" data-phase value="第3期" checked>第3期</label>
            </div>
            <div class="filter-group">
              <strong>线路</strong>
              <label><input type="checkbox" data-type value="干线">干线</label>
              <label><input type="checkbox" data-type value="支线">支线</label>
            </div>
            <div class="filter-group">
              <strong>显示</strong>
              <label><input type="checkbox" id="toggleLabels" checked>标签</label>
              <label><input type="checkbox" id="toggleMembers" checked>成员行政区</label>
              <button type="button" id="toggleOriginalBtn" class="subtle">显示原文</button>
              <button type="button" id="resetViewBtn">重置视图</button>
            </div>
          </div>
        </section>
        <section class="top-card">
          <div class="top-card-inner top-stats">
            <div class="stat-card"><div class="k">可见线路</div><div class="v" id="visibleLineCount">0</div></div>
            <div class="stat-card"><div class="k">可见商圈</div><div class="v" id="visibleCityCount">0</div></div>
          </div>
        </section>
      </div>
    </div>
    <div class="main">
      <section class="map-card">
        <div id="map"></div>
      </section>
      <aside class="sidebar">
        <section class="section-card">
          <div class="section-head">
            <h2>线路清单</h2>
            <p>文案格式已统一为：分期 / 线路类型 / 运行日 + 起终点 + 串点路径。</p>
          </div>
          <div class="section-body">
            <div class="line-list" id="lineList"></div>
          </div>
        </section>
      </aside>
    </div>
  </div>

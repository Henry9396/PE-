 "name": "特鲁希略两翼补强线", "phase": "第2期", "type": "支线", "nodes": [{"circle": "TRUJILLO城市圈", "label_cn": "特鲁希略主城圈", "label_es": "Trujillo Core", "lat": -8.1094, "lon": -79.0333}, {"circle": "PAIJAN城市圈", "label_cn": "特鲁希略北翼圈", "label_es": "Trujillo North Wing", "lat": -7.7319, "lon": -79.3019}, {"circle": "CHAO城市圈", "label_cn": "特鲁希略南翼圈", "label_es": "Trujillo South Wing", "lat": -8.5394, "lon": -78.6825}], "note": "北海岸主城做稳后，再扩张两翼承接圈。"}, {"code": "R15", "name": "皮乌拉西翼补盲线", "phase": "第3期", "type": "支线", "nodes": [{"circle": "PIURA城市圈", "label_cn": "皮乌拉主城圈", "label_es": "Piura Core", "lat": -5.1942, "lon": -80.6289}, {"circle": "LAS LOMAS城市圈", "label_cn": "皮乌拉西翼圈", "label_es": "Piura West Wing", "lat": -4.6578, "lon": -80.2442}], "note": "作为覆盖型圈，适合低频补盲。"}, {"code": "R16", "name": "卡哈马卡东侧补盲线", "phase": "第3期", "type": "支线", "nodes": [{"circle": "CAJAMARCA城市圈", "label_cn": "卡哈马卡门户圈", "label_es": "Cajamarca Gateway", "lat": -7.1564, "lon": -78.5153}, {"circle": "CELENDIN城市圈", "label_cn": "卡哈马卡东部覆盖圈", "label_es": "East Cajamarca Coverage", "lat": -6.8681, "lon": -78.1489}, {"circle": "BAMBAMARCA城市圈", "label_cn": "卡哈马卡北部覆盖圈", "label_es": "North Cajamarca Coverage", "lat": -6.6786, "lon": -78.5242}], "note": "山地低密度区域不抢一期资源。"}, {"code": "R17", "name": "阿雷基帕西翼补盲线", "phase": "第3期", "type": "支线", "nodes": [{"circle": "AREQUIPA城市圈", "label_cn": "阿雷基帕主城圈", "label_es": "Arequipa Core", "lat": -16.4008, "lon": -71.5378}, {"circle": "MAJES城市圈", "label_cn": "阿雷基帕西翼圈", "label_es": "Arequipa West Wing", "lat": -16.3586, "lon": -72.1908}], "note": "西翼圈作为覆盖补盲存在，不前置重资产。"}, {"code": "R18", "name": "胡宁东向覆盖线", "phase": "第3期", "type": "支线", "nodes": [{"circle": "CHANCHAMAYO城市圈", "label_cn": "昌查马约承接圈", "label_es": "Chanchamayo Connector", "lat": -11.0558, "lon": -75.3292}, {"circle": "PERENE城市圈", "label_cn": "胡宁东向承接圈", "label_es": "Junin East Connector", "lat": -10.9522, "lon": -75.2244}, {"circle": "SATIPO城市圈", "label_cn": "萨蒂波雨林覆盖圈", "label_es": "Satipo Coverage", "lat": -11.2531, "lon": -74.6372}], "note": "雨林承接圈采用轻资产、低频补盲方式。"}, {"code": "R19", "name": "南中山地覆盖线", "phase": "第3期", "type": "支线", "nodes": [{"circle": "AYACUCHO城市圈", "label_cn": "阿亚库乔山地圈", "label_es": "Ayacucho Highland", "lat": -13.1542, "lon": -74.2228}, {"circle": "HUANCAVELICA城市圈", "label_cn": "万卡维利卡覆盖圈", "label_es": "Huancavelica Coverage", "lat": -12.7869, "lon": -74.9756}], "note": "覆盖优先，不用一期主干标准硬套。"}, {"code": "R20", "name": "中北山地东向补盲线", "phase": "第3期", "type": "支线", "nodes": [{"circle": "HUANUCO城市圈", "label_cn": "瓦努科门户圈", "label_es": "Huanuco Gateway", "lat": -9.9269, "lon": -76.2403}, {"circle": "TINGO MARIA城市圈", "label_cn": "廷戈玛丽亚承接圈", "label_es": "Tingo Maria Connector", "lat": -9.2944, "lon": -75.9969}], "note": "等门户站稳后再向东延伸。"}, {"code": "R21", "name": "拉利伯塔德山地覆盖线", "phase": "第3期", "type": "支线", "nodes": [{"circle": "TRUJILLO城市圈", "label_cn": "特鲁希略主城圈", "label_es": "Trujillo Core", "lat": -8.1094, "lon": -79.0333}, {"circle": "USQUIL城市圈", "label_cn": "拉利伯塔德山地区", "label_es": "La Libertad Highlands", "lat": -7.8156, "lon": -78.4192}], "note": "保留商圈，但定位为后置覆盖。"}]};
    const map = L.map('map', {zoomControl:true, dragging:true, scrollWheelZoom:true}).setView([-10.3, -75.7], 6);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:18, attribution:'&copy; OpenStreetMap'}).addTo(map);
    const colors = payload.phase_colors;
    const linesLayer = L.layerGroup().addTo(map);
    const citiesLayer = L.layerGroup().addTo(map);
    const membersLayer = L.layerGroup().addTo(map);
    const labelsLayer = L.layerGroup().addTo(map);
    let activeCircle = null;
    let showOriginal = false;
    function radarIcon(color) { return L.divIcon({html:`<div class="radar" style="color:${color}"></div>`, iconSize:[24,24], iconAnchor:[12,12]}); }
    function miniRadarIcon(color) { return L.divIcon({html:`<div class="mini-radar" style="color:${color}"></div>`, iconSize:[14,14], iconAnchor:[7,7]}); }
    const cityLayers = {};
    const labelLayers = {};
    const memberLayers = {};
    const lineLayers = {};
    payload.cities.forEach(city => {
      const color = colors[city.phase] || '#7f8b96';
      const marker = L.marker([city.lat, city.lon], {icon: radarIcon(color), zIndexOffset:900});
      const memberList = city.members.map(m => `${m.member_district} (${m.member_ubigeo})`).join('<br>');
      marker.bindPopup(`<div class="popup-title">${city.label_cn}</div>
        <div class="popup-row">原商圈：${city.circle}</div>
        <div class="popup-row">规划分期：${city.phase}</div>
        <div class="popup-row">网络角色：${city.role}</div>
        <div class="popup-row">归属走廊：${city.route}</div>
        <div class="popup-row">2025官方人口：${city.official_pop_2025.toLocaleString('en-US')}</div>
        <div class="popup-row">重构原因：${city.reason}</div>
        <div class="popup-row">成员行政区：<br>${memberList}</div>`);
      cityLayers[city.circle] = marker;
      labelLayers[city.circle] = L.tooltip({permanent:true, direction:'top', offset:[0,-14], className:'city-label'})
        .setLatLng([city.lat, city.lon])
        .setContent(city.label_cn);
    });
    payload.members.forEach(item => {
      const color = colors[item.new_phase] || '#7f8b96';
      const marker = L.marker([item.lat, item.lon], {icon: miniRadarIcon(color), zIndexOffset:240});
      marker.bindPopup(`<div class="popup-title">${item.member_district}</div>
        <div class="popup-row">UBIGEO：${item.member_ubigeo}</div>
        <div class="popup-row">所属商圈：${item.label_cn}</div>
        <div class="popup-row">成员人口：${item.member_pop.toLocaleString('en-US')}</div>`);
      if (!memberLayers[item.circle]) memberLayers[item.circle] = [];
      memberLayers[item.circle].push(marker);
    });
    payload.lines.forEach(line => {
      const latlngs = line.nodes.map(n => [n.lat, n.lon]);
      const style = line.type === '干线'
        ? {color:'#d62f2f', weight:5, opacity:0.92}
        : {color:'#2558bd', weight:3.2, opacity:0.92, dashArray:'8 10', lineCap:'round'};
      const poly = L.polyline(latlngs, style);
      poly.bindPopup(`<div class="popup-title">${line.code} / ${line.name}</div>
        <div class="popup-row">${line.phase} / ${line.type}</div>
        <div class="popup-row">${line.nodes.map(n => n.label_cn).join(' → ')}</div>
        <div class="popup-row">说明：${line.note}</div>`);
      lineLayers[line.code] = {layer: poly, info: line, bounds: poly.getBounds()};
    });
    function activeFilters() {
      return {
        phases: new Set(Array.from(document.querySelectorAll('input[data-phase]:checked')).map(el => el.value)),
        types: new Set(Array.from(document.querySelectorAll('input[data-type]:checked')).map(el => el.value)),
        labels: document.getElementById('toggleLabels').checked,
        members: document.getElementById('toggleMembers').checked,
      };
    }
    function lineCard(line) {
      return `<div class="line-card">
        <div class="line-name">${line.code} / ${line.name}</div>
        <div class="meta">${line.phase} / ${line.type}</div>
        <div class="route">${line.nodes.map(n => showOriginal ? n.label_es : n.label_cn).join(' → ')}</div>
        <div class="meta">${line.note}</div>
      </div>`;
    }
    function refresh(fit=false) {
      const f = activeFilters();
      linesLayer.clearLayers();
      citiesLayer.clearLayers();
      membersLayer.clearLayers();
      labelsLayer.clearLayers();
      let bounds = null;
      const visibleLines = [];
      Object.values(lineLayers).forEach(obj => {
        const show = f.phases.has(obj.info.phase) && f.types.has(obj.info.type);
        if (!show) return;
        obj.layer.addTo(linesLayer);
        visibleLines.push(obj.info);
        bounds = bounds ? bounds.extend(obj.bounds) : L.latLngBounds(obj.bounds);
      });
      let visibleCities = 0;
      payload.cities.forEach(city => {
        if (!f.phases.has(city.phase)) return;
        cityLayers[city.circle].addTo(citiesLayer);
        visibleCities += 1;
        labelLayers[city.circle].setContent(showOriginal ? city.label_es : city.label_cn);
        if (f.labels) labelLayers[city.circle].addTo(labelsLayer);
        if (f.members && memberLayers[city.circle]) {
          memberLayers[city.circle].forEach(m => {
            m.setOpacity(!activeCircle || activeCircle === city.circle ? 1 : 0.18);
            m.addTo(membersLayer);
          });
        }
        const p = L.latLng(city.lat, city.lon);
        bounds = bounds ? bounds.extend(p) : L.latLngBounds([p],[p]);
      });
      document.getElementById('visibleLineCount').textContent = visibleLines.length;
      document.getElementById('visibleCityCount').textContent = visibleCities;
      document.getElementById('lineList').innerHTML = visibleLines.map(lineCard).join('') || '<div class="line-card"><div class="meta">当前没有符合筛选条件的线路</div></div>';
      const hideSidebar = visibleLines.length === 0;
      document.getElementById('sidebar').classList.toggle('hidden', hideSidebar);
      document.getElementById('mainLayout').classList.toggle('sidebar-collapsed', hideSidebar);
      if (fit && bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.14));
    }
    document.querySelectorAll('input[data-phase],input[data-type],#toggleLabels,#toggleMembers').forEach(el => el.addEventListener('change', () => refresh(false)));
    document.getElementById('toggleOriginalBtn').addEventListener('click', e => {
      showOriginal = !showOriginal;
      e.currentTarget.textContent = showOriginal ? '显示中文' : '显示原文';
      refresh(false);
    });
    document.getElementById('resetViewBtn').addEventListener('click', () => refresh(true));
    payload.cities.forEach(city => {
      cityLayers[city.circle].on('click', e => {
        if (e.originalEvent) L.DomEvent.stopPropagation(e.originalEvent);
        activeCircle = activeCircle === city.circle ? null : city.circle;
        refresh(false);
        cityLayers[city.circle].openPopup();
      });
    });
    map.on('click', () => {
      if (activeCircle) {
        activeCircle = null;
        refresh(false);
      }
    });
    refresh(true);
  </script>
</body>
</html>

      position: absolute; z-index: 1000; top: 14px; left: 14px; width: 340px;
      background: rgba(255,255,255,0.94); border-radius: 14px; padding: 14px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }
    .panel h1 { margin: 0 0 8px; font-size: 18px; }
    .panel p { margin: 0 0 6px; font-size: 12px; line-height: 1.45; color: #425466; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .radar {
      position: relative; width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid currentColor; background: currentColor;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.8);
    }
    .radar::after {
      content: ""; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 18px; height: 18px; border-radius: 50%; border: 2px solid currentColor;
      opacity: 0.45; animation: pulse 1.8s infinite ease-out;
    }
    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
    }
    .leaflet-div-icon { background: transparent; border: none; }
    .popup-title { font-weight: 700; margin-bottom: 6px; }
    .popup-row { font-size: 12px; line-height: 1.45; }
  </style>
